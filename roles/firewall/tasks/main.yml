---
# SPDX-License-Identifier: MIT-0

- name: Install UFW
  ansible.builtin.apt:
    name: ufw
    state: present

- name: Allow SSH
  community.general.ufw:
    rule: allow
    port: "22"

- name: Allow HTTP
  community.general.ufw:
    rule: allow
    port: "80"

- name: Allow HTTPS
  community.general.ufw:
    rule: allow
    port: "443"

- name: Enable UFW
  community.general.ufw:
    state: enabled
